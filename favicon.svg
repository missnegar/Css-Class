<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <!-- Beautiful Rounded Base -->
  <rect width="460" height="460" x="26" y="26" rx="110" fill="url(#grad)" />
  
  <!-- Subtle inner border for depth -->
  <rect width="456" height="456" x="28" y="28" rx="108" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4" />

  <!-- CSS Braces -->
  <g fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Curly Brace { -->
    <path d="M 210 140 H 185 A 25 25 0 0 0 160 165 V 225 A 25 25 0 0 1 135 250 A 25 25 0 0 1 160 275 V 335 A 25 25 0 0 0 185 360 H 210" />
    <!-- Right Curly Brace } -->
    <path d="M 302 140 H 327 A 25 25 0 0 1 352 165 V 225 A 25 25 0 0 0 377 250 A 25 25 0 0 0 352 275 V 335 A 25 25 0 0 1 327 360 H 302" />
  </g>
  
  <!-- Modern CSS Semicolon ; in center -->
  <circle cx="256" cy="210" r="22" fill="#ffffff" />
  <circle cx="256" cy="275" r="22" fill="#ffffff" />
  <path d="M 256 275 C 256 310, 235 325, 230 328" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" />
</svg>
